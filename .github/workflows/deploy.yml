name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Site principal -> racine du bucket. On EXCLUT projets/* pour ne pas écraser
# les projets déployés (ex. /projets/voyages/japon).
env:
  AWS_REGION: eu-west-3
  S3_BUCKET: stevemorgeat.fr
  CLOUDFRONT_DISTRIBUTION_ID: EKLE8NHQK9J8O

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync dist vers la racine (projets/* protégés)
        run: aws s3 sync dist "s3://$S3_BUCKET" --delete --exclude "projets/*"

      - name: Invalidation CloudFront
        run: aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
