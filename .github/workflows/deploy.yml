name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "lib/**"
      - "content/**"
      - "public/**"
      - "scripts/**"
      - "next.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Site principal (le blog Next, export statique) -> racine du bucket.
# On EXCLUT projets/* pour ne pas écraser les sous-sites déployés (ex. couvreur Hassli).
env:
  AWS_REGION: eu-west-3
  S3_BUCKET: stevemorgeat.fr
  CLOUDFRONT_DISTRIBUTION_ID: EKLE8NHQK9J8O

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build:next # next build (export statique) + sitemap/RSS/robots -> out/

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 2 passes de cache : les assets Next (noms hashés) sont immutables et mis en
      # cache 1 an ; le HTML et les fichiers SEO restent revalidés pour que la
      # mise en ligne soit prise en compte tout de suite. projets/* protégés.
      - name: Sync assets (immutable, cache long)
        run: |
          aws s3 sync out "s3://$S3_BUCKET" --delete \
            --exclude "projets/*" --exclude "*.html" --exclude "*.xml" --exclude "*.txt" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync HTML & SEO (no-cache)
        run: |
          aws s3 sync out "s3://$S3_BUCKET" \
            --exclude "*" --include "*.html" --include "*.xml" --include "*.txt" \
            --cache-control "no-cache"

      - name: Invalidation CloudFront
        run: aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
